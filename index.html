<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding RSVP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:linear-gradient(135deg,#f7f4f5,#ece8eb);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;

}

.container{

    width:100%;
    max-width:700px;

    background:#fff;

    border-radius:20px;

    padding:45px;

    box-shadow:0 15px 45px rgba(0,0,0,.12);

}

h1{

    font-family:'Cormorant Garamond',serif;

    text-align:center;

    font-size:52px;

    color:#b07b8f;

    margin-bottom:10px;

}

.subtitle{

    text-align:center;

    color:#777;

    margin-bottom:35px;

}

.form-group{

    margin-bottom:22px;

}

label{

    display:block;

    margin-bottom:8px;

    font-weight:500;

    color:#555;

}

input,
textarea,
select{

    width:100%;

    padding:14px;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:15px;

    font-family:inherit;

    transition:.2s;

}

input:focus,
textarea:focus,
select:focus{

    outline:none;

    border-color:#d8a8b9;

    box-shadow:0 0 0 4px rgba(216,168,185,.2);

}

textarea{

    resize:vertical;

    min-height:120px;

}

.radio-group{

    display:flex;

    gap:25px;

    margin-top:10px;

}

.radio-group label{

    display:flex;

    align-items:center;

    gap:8px;

    font-weight:400;

    cursor:pointer;

}

.radio-group input{

    width:auto;

}

button{

    width:100%;

    padding:16px;

    background:#b07b8f;

    color:white;

    border:none;

    border-radius:12px;

    font-size:16px;

    cursor:pointer;

    transition:.2s;

}

button:hover{

    background:#9b667a;

}

#success{

    display:none;

    text-align:center;

    margin-top:25px;

    color:#3d8a53;

    font-weight:600;

}

@media(max-width:600px){

.container{

padding:30px;

}

h1{

font-size:40px;

}

.radio-group{

flex-direction:column;

gap:12px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Wedding RSVP</h1>

<p class="subtitle">
Please let us know if you'll be celebrating with us.
</p>

<form id="rsvpForm">

<div class="form-group">

<label for="name">
Name <span style="color:#c55;">*</span>
</label>

<input
type="text"
id="name"
required>

</div>

<div class="form-group">

<label for="email">
Email Address <span style="color:#c55;">*</span>
</label>

<input
type="email"
id="email"
required>

</div>

<div class="form-group">

<label for="attendance">
Will you be attending? <span style="color:#c55;">*</span>
</label>

<select id="attendance" required>

<option value="">Please select</option>
<option>Joyfully Accept</option>
<option>Regretfully Decline</option>

</select>

</div>

<div class="form-group">

<label for="diet">
Do you have any food allergies or dietary restrictions? If yes, please specify. <span style="color:#c55;">*</span>
</label>

<textarea
id="diet"
required
placeholder="If none, please type 'None'."></textarea>

</div>

<div class="form-group">

<label>
Will you need parking? <span style="color:#c55;">*</span>
</label>

<div class="radio-group">

<label>
<input
type="radio"
name="parking"
value="Yes"
required>
Yes
</label>

<label>
<input
type="radio"
name="parking"
value="No">
No
</label>

</div>

</div>

<div class="form-group">

<label for="song">
Song Request (Optional)
</label>

<input
type="text"
id="song"
placeholder="Your favorite dance song">

</div>

<div class="form-group">

<label for="message">
Message for the Couple (Optional)
</label>

<textarea
id="message"
placeholder="Leave us a message..."></textarea>

</div>

<button type="submit">
Submit RSVP
</button>

</form>

<div id="success">
🎉 Thank you! Your RSVP has been received.
</div>

</div>

<script>

const form = document.getElementById("rsvpForm");

form.addEventListener("submit", async function(e){

e.preventDefault();

const parking = document.querySelector('input[name="parking"]:checked').value;

const data = {

name: document.getElementById("name").value,

email: document.getElementById("email").value,

attendance: document.getElementById("attendance").value,

diet: document.getElementById("diet").value,

parking: parking,

song: document.getElementById("song").value,

message: document.getElementById("message").value

};

try{

await fetch("https://script.google.com/macros/s/AKfycbxFKip6tu0Qx5h2qX_lyBznJ5DrLcvCdHZVN0xhiguTx8GESDDO0nOYNLHTeKzEj12E/exec",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

});

form.reset();

document.getElementById("success").style.display="block";

}
catch(error){

alert("Something went wrong. Please try again.");

}

});

</script>

</body>
</html>
