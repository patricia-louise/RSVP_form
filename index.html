<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wedding RSVP</title>

    <link rel="icon" href="assets/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- Dark Overlay -->

    <div class="page-overlay"></div>

    <!-- RSVP Card -->

    <main class="rsvp-container">

        <!-- RSVP Header -->

        <div class="rsvp-header">

            <img
                src="assets/logo-rsvp.png"
                class="logo"
                alt="RSVP">

            <img
                src="assets/wax-seal.png"
                class="seal"
                alt="Wax Seal">

        </div>

        <!-- Intro -->

        <p class="intro">

            We can't wait to celebrate with you!

            Kindly respond on or before

            <strong>July 20, 2026</strong>

        </p>

        <!-- Form -->

        <form id="rsvpForm">

            <!-- Name -->

            <div class="field">

                <label>

                    Name
                    <span>*</span>

                </label>

                <input
                    type="text"
                    id="name"
                    required>

            </div>

            <!-- Email -->

            <div class="field">

                <label>

                    Email Address
                    <span>*</span>

                </label>

                <input
                    type="email"
                    id="email"
                    required>

            </div>

            <!-- Attendance -->

            <div class="field">

                <label>

                    Will you be attending?
                    <span>*</span>

                </label>

                <div class="attendance-buttons">

                    <button
                        type="button"
                        class="attendance-btn"
                        data-value="Joyfully Accept">

                        Joyfully Accept

                    </button>

                    <button
                        type="button"
                        class="attendance-btn"
                        data-value="Regretfully Decline">

                        Regretfully Decline

                    </button>

                </div>

                <input
                    type="hidden"
                    id="attendance"
                    required>

            </div>

            <!-- CONDITIONAL AREA -->

            <div id="acceptFields">

                <!-- Food -->

                <div class="field">

                    <label>

                        Do you have any food allergies or dietary restrictions?

                        <span>*</span>

                    </label>

                    <textarea
                        id="diet"
                        rows="3"
                        placeholder="If none, simply type 'None'."></textarea>

                </div>

                <!-- Parking -->

                <div class="field">

                    <label>

                        Will you need parking?

                        <span>*</span>

                    </label>

                    <div class="parking-buttons">

                        <button
                            type="button"
                            class="parking-btn"
                            data-value="Yes">

                            Yes

                        </button>

                        <button
                            type="button"
                            class="parking-btn"
                            data-value="No">

                            No

                        </button>

                    </div>

                    <input
                        type="hidden"
                        id="parking">

                </div>

                <!-- Song -->

                <div class="field">

                    <label>

                        Song Request

                    </label>

                    <input
                        type="text"
                        id="song"
                        placeholder="Optional">

                </div>

            </div>

            <!-- Decline Message -->

            <div
                id="declineMessage"
                class="hidden">

                <p>

                    We're so sorry you won't be able to celebrate with us.

                    Thank you for letting us know.

                    ❤️

                </p>

            </div>

            <!-- Message -->

            <div class="field">

                <label>

                    Message for the Couple

                </label>

                <textarea
                    id="message"
                    rows="4"
                    placeholder="Optional"></textarea>

            </div>

            <!-- Submit -->

            <button
                id="submitButton"
                type="submit">

                Submit RSVP

            </button>

        </form>

        <!-- Success Screen -->

        <div
            id="successScreen"
            class="hidden">

            <div class="heart">

                ♥

            </div>

            <h2>

                Thank You!

            </h2>

            <p id="successText">

                Your RSVP has been received.

            </p>

        </div>

    </main>

    <!-- Deadline Card -->

    <div class="deadline-card">

        Kindly respond on or before

        <strong>

            JULY 20, 2026

        </strong>

    </div>

    <!-- Loading Overlay -->

    <div
        id="loadingOverlay"
        class="hidden">

        <div class="loader"></div>

        <p>

            Saving your RSVP...

        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
